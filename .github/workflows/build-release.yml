name: Build and Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Prepare updater bundle
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUNDLE=src-tauri/target/release/bundle
          APPIMAGE="${BUNDLE}/appimage/PyArsenal_${VERSION}_amd64.AppImage"
          # Create .tar.gz for the updater
          cd "${BUNDLE}/appimage"
          tar czf "PyArsenal_${VERSION}_amd64.AppImage.tar.gz" "PyArsenal_${VERSION}_amd64.AppImage"

      - name: Sign updater bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUNDLE=src-tauri/target/release/bundle
          # Install tauri-cli for signing
          cargo install tauri-cli --version "^2" || true
          cargo tauri signer sign \
            "${BUNDLE}/appimage/PyArsenal_${VERSION}_amd64.AppImage.tar.gz" \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUNDLE=src-tauri/target/release/bundle

          gh release create "$GITHUB_REF_NAME" \
            --title "PyArsenal v${VERSION}" \
            --notes "See the changelog for details." \
            --latest || true

          gh release upload "$GITHUB_REF_NAME" \
            "${BUNDLE}/appimage/PyArsenal_${VERSION}_amd64.AppImage" \
            "${BUNDLE}/appimage/PyArsenal_${VERSION}_amd64.AppImage.tar.gz" \
            "${BUNDLE}/appimage/PyArsenal_${VERSION}_amd64.AppImage.tar.gz.sig" \
            "${BUNDLE}/deb/PyArsenal_${VERSION}_amd64.deb" \
            "${BUNDLE}/rpm/PyArsenal-${VERSION}-1.x86_64.rpm" \
            --clobber

      - name: Save signature
        uses: actions/upload-artifact@v4
        with:
          name: linux-sig
          path: src-tauri/target/release/bundle/appimage/*.tar.gz.sig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Prepare and sign updater bundle
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PASSWORD }}
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $NSIS = "src-tauri\target\release\bundle\nsis"
          $EXE_PATH = "$NSIS\PyArsenal_${VERSION}_x64-setup.exe"
          $ZIP_PATH = "$NSIS\PyArsenal_${VERSION}_x64-setup.nsis.zip"
          # Create zip using .NET with explicit Deflate compression (Optimal = Deflate)
          Add-Type -Assembly System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::Open($ZIP_PATH, 'Create')
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($zip, $EXE_PATH, "PyArsenal_${VERSION}_x64-setup.exe", [System.IO.Compression.CompressionLevel]::Optimal)
          $zip.Dispose()
          Write-Host "Created zip: $ZIP_PATH"
          # Sign
          cargo install tauri-cli --version "^2"
          cargo tauri signer sign $ZIP_PATH --private-key $env:TAURI_SIGNING_PRIVATE_KEY --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUNDLE=src-tauri/target/release/bundle

          gh release upload "$GITHUB_REF_NAME" \
            "${BUNDLE}/nsis/PyArsenal_${VERSION}_x64-setup.exe" \
            "${BUNDLE}/nsis/PyArsenal_${VERSION}_x64-setup.nsis.zip" \
            "${BUNDLE}/nsis/PyArsenal_${VERSION}_x64-setup.nsis.zip.sig" \
            "${BUNDLE}/msi/PyArsenal_${VERSION}_x64_en-US.msi" \
            --clobber

      - name: Save signature
        uses: actions/upload-artifact@v4
        with:
          name: windows-sig
          path: src-tauri/target/release/bundle/nsis/*.nsis.zip.sig

  publish-updater:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download signatures
        uses: actions/download-artifact@v4
        with:
          path: sigs

      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          LINUX_SIG=$(cat sigs/linux-sig/*.sig)
          WINDOWS_SIG=$(cat sigs/windows-sig/*.sig)
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{\n  "version": "v%s",\n  "notes": "PyArsenal v%s",\n  "pub_date": "%s",\n  "platforms": {\n    "linux-x86_64": {\n      "signature": "%s",\n      "url": "https://github.com/%s/releases/download/v%s/PyArsenal_%s_amd64.AppImage.tar.gz"\n    },\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "https://github.com/%s/releases/download/v%s/PyArsenal_%s_x64-setup.nsis.zip"\n    }\n  }\n}\n' \
            "$VERSION" "$VERSION" "$PUB_DATE" \
            "$LINUX_SIG" "$REPO" "$VERSION" "$VERSION" \
            "$WINDOWS_SIG" "$REPO" "$VERSION" "$VERSION" \
            > latest.json
          echo "Generated latest.json:"
          cat latest.json
          gh release upload "v${VERSION}" latest.json --clobber --repo "${REPO}"
